<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="50%" stop-color="#0055ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Fine Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#0055ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Background Radial Glow -->
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0055ff" stop-opacity="0.3" />
      <stop offset="60%" stop-color="#8b5cf6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#080808" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glow Filter for the Monogram -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Glow Background -->
  <circle cx="256" cy="256" r="240" fill="url(#glow-grad)" />

  <!-- Outer Glassmorphic Ring/Container -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="#080808" fill-opacity="0.85" stroke="url(#border-grad)" stroke-width="4" />

  <!-- "JV" Monogram -->
  <g filter="url(#glow)">
    <!-- "J" Shape -->
    <path d="M 180,155 L 180,295 A 45,45 0 0,1 90,295" 
          fill="none" 
          stroke="url(#brand-grad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- "V" Shape -->
    <path d="M 235,155 L 312.5,345 L 390,155" 
          fill="none" 
          stroke="url(#brand-grad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Glowing Accent Dot (JV.CORE Pulse Dot) -->
    <circle cx="312.5" cy="100" r="18" fill="#00f5ff" />
  </g>
</svg>